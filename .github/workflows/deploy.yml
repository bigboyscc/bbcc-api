name: Deploy BBCC API to Production

on:
  push:
    branches:
      - production
  workflow_dispatch:

env:
  PROJECT_NAME: bbcc
  APP_TYPE: api
  ENVIRONMENT: production
  AWS_REGION: ap-south-1

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test || echo "No tests configured"

      - name: Build TypeScript
        run: npm run build

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: 3.7.152.188
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            PROJECT="bbcc"
            APP_TYPE="api"
            ENV="production"

            echo "🚀 Deploying BBCC API..."
            mkdir -p /home/ubuntu/apps/$PROJECT/$APP_TYPE
            cd /home/ubuntu/apps/$PROJECT/$APP_TYPE

            if [ ! -d ".git" ]; then
              git clone git@github.com:bigboyscc/bbcc-api.git .
            else
              git pull origin production || git pull origin main
            fi

            npm ci
            npm run build

            export AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}
            export AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}
            /home/ubuntu/scripts/fetch-secrets.sh $PROJECT $APP_TYPE $ENV
            cp /tmp/.env.$PROJECT-$APP_TYPE-$ENV .env.production

            if pm2 describe $PROJECT-$APP_TYPE > /dev/null 2>&1; then
              pm2 restart $PROJECT-$APP_TYPE
            else
              pm2 start /home/ubuntu/apps/ecosystem.config.js --only $PROJECT-$APP_TYPE
            fi
            pm2 save

            sleep 5
            curl -f http://localhost:5003/health || echo "⚠️  Health check failed"
            echo "✅ Done!"
